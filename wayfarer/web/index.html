<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="wayfarer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>wayfarer</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Initial Loading Screen (Blue & Wayfarer Text) -->
  <div id="loading" style="position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#F8FAFC;font-family: 'Outfit', sans-serif;">
    <div style="font-size: 48px; font-weight: 900; color: #132F5C; margin-bottom: 32px; letter-spacing: -0.5px;">Wayfarer</div>
    <div style="width:40px;height:40px;border:4px solid #132F5C;border-top:4px solid transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
    <div style="margin-top: 24px; font-size: 10px; font-weight: 800; color: #94A3B8; letter-spacing: 2.0px; text-transform: uppercase;">Preparing Your Journey</div>
  </div>
  <style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @font-face {
      font-family: 'Outfit';
      src: url('https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap');
    }
  </style>
  
  <script>
    window.flutterWebRenderer = "html";
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.querySelector('#loading');
      if (loader) {
        loader.remove();
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
